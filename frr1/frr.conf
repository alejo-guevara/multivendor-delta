frr version 9.0
frr defaults traditional
hostname frr1
log syslog informational
no ipv6 forwarding
service integrated-vtysh-config

!
! ============================================================
! Interfaces
! ============================================================
interface eth1
 description "Link to SR Linux e1-1"
 ip address 10.0.2.2/30
 ip ospf area 0
 ip ospf network point-to-point
 ip link mtu 1500
 ip ospf mtu-ignore
!
interface eth2
 description "Link to Cumulus swp1"
 ip address 10.0.2.5/30
 ip ospf area 0
 ip ospf network point-to-point
 ip link mtu 1500
 ip ospf mtu-ignore
!
interface lo
 ip address 10.255.0.2/32
 ip address 10.100.1.1/32
 ip address 10.100.1.2/32
 ip ospf area 0
!

! ============================================================
! OSPF Underlay (area 0 — point-to-point links)
! ============================================================
router ospf
 ospf router-id 10.255.0.2
 network 10.0.2.0/30 area 0
 network 10.0.2.4/30 area 0
 network 10.255.0.2/32 area 0
 passive-interface lo
!

! ============================================================
! iBGP (AS 65000)
! Sessions over loopbacks, OSPF provides reachability
! ============================================================
router bgp 65000
 bgp router-id 10.255.0.2
 bgp log-neighbor-changes
 no bgp ebgp-requires-policy
 !
 neighbor 10.255.0.1 remote-as 65000
 neighbor 10.255.0.1 description "SR Linux D2L"
 neighbor 10.255.0.1 update-source lo
 !
 neighbor 10.255.0.3 remote-as 65000
 neighbor 10.255.0.3 description "Cumulus VX"
 neighbor 10.255.0.3 update-source lo
 !
 address-family ipv4 unicast
  neighbor 10.255.0.1 activate
  neighbor 10.255.0.1 next-hop-self
  neighbor 10.255.0.3 activate
  neighbor 10.255.0.3 next-hop-self
  network 10.255.0.2/32
  network 10.100.1.1/32
  network 10.100.1.2/32
 exit-address-family
!
ip route 10.0.10.0/30 10.0.2.1
ip route 10.0.11.0/30 10.0.2.6
!
line vty
!
