frr version 9.0
frr defaults traditional
hostname cvx1
log syslog informational
no ipv6 forwarding
service integrated-vtysh-config

!
! ============================================================
! Interfaces
! ============================================================
interface swp1
 description "Link to FRR eth2"
 ip address 10.0.2.6/30
 ip ospf area 0
 ip ospf network point-to-point
!
interface swp2
 description "Link to SR Linux e1-2 (1-hop shortcut)"
 ip address 10.0.2.10/30
 ip ospf area 0
 ip ospf network point-to-point
!
interface swp3
 description "Ixia RX port eth2"
 ip address 10.0.3.1/30
!
interface swp4
 description "Alpine iPerf RX"
 ip address 10.0.11.1/30
!
interface lo
 ip address 10.255.0.3/32
 ip ospf area 0
!

! ============================================================
! OSPF Underlay
! ============================================================
router ospf
 ospf router-id 10.255.0.3
 network 10.0.2.4/30 area 0
 network 10.0.2.8/30 area 0
 network 10.255.0.3/32 area 0
 passive-interface lo
 passive-interface swp3
 passive-interface swp4
!

! ============================================================
! iBGP (AS 65000)
! ============================================================
router bgp 65000
 bgp router-id 10.255.0.3
 bgp log-neighbor-changes
 no bgp ebgp-requires-policy
 !
 neighbor 10.255.0.1 remote-as 65000
 neighbor 10.255.0.1 description "SR Linux D2L"
 neighbor 10.255.0.1 update-source lo
 !
 neighbor 10.255.0.2 remote-as 65000
 neighbor 10.255.0.2 description "FRR"
 neighbor 10.255.0.2 update-source lo
 !
 address-family ipv4 unicast
  neighbor 10.255.0.1 activate
  neighbor 10.255.0.1 next-hop-self
  neighbor 10.255.0.2 activate
  neighbor 10.255.0.2 next-hop-self
  !
  network 10.0.3.0/30
  network 10.0.11.0/30
  network 10.255.0.3/32
 exit-address-family
!
line vty
!
